services:
  fabia-shop:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fabia_shop
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - MATOMO_URL=${MATOMO_URL:-}
      - MATOMO_SITE_ID=${MATOMO_SITE_ID:-1}
      - MATOMO_TOKEN_AUTH=${MATOMO_TOKEN_AUTH:-}
      - MATOMO_EXCLUDE_IPS=${MATOMO_EXCLUDE_IPS:-}
      - META_PIXEL_ID=${META_PIXEL_ID:-}
      - META_ACCESS_TOKEN=${META_ACCESS_TOKEN:-}
      - META_CAPI_VERSION=${META_CAPI_VERSION:-v18.0}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
