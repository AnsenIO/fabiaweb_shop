# fabiaweb_shop — nginx proxies everything to Flask + certbot SSL
server {
    server_name shop.fabiabox.com;

    root /var/www/fabiaweb_shop;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Block sensitive files before they reach Flask
    location ~ /\.env { deny all; }
    location ~ /\.git { deny all; }
    location ~ \.(csv|py|sh|conf|txt)$ { deny all; }

    # Proxy all traffic to Flask, preserving forwarder info for Meta Pixel
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Referer $http_referer;
    }

    # Certbot SSL
    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/shop.fabiabox.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/shop.fabiabox.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# HTTP -> HTTPS redirect (managed by Certbot)
server {
    if ($host = shop.fabiabox.com) { return 301 https://$host$request_uri; }
    listen 80;
    listen [::]:80;
    server_name shop.fabiabox.com;
    return 404; # managed by Certbot
}
