# fabiaweb_shop — nginx reverse proxy to Flask (port 8081) + certbot SSL
server {
    server_name shop.fabiabox.com;

    # Security headers (defense in depth)
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Block sensitive files at nginx level for defense-in-depth
    location ~ /\.env  { deny all; access_log off; }
    location ~ /\.git  { deny all; access_log off; }
    location ~ \.(csv|py|sh|conf|txt)$ { deny all; access_log off; }

    # Proxy ALL traffic to Flask, preserving forwarder info for Meta Pixel
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Referer $http_referer;
    }

    # Certbot SSL — managed by certbot, do not remove!
    listen 443 ssl; # managed by Certbot (dual-stack)
    ssl_certificate /etc/letsencrypt/live/shop.fabiabox.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shop.fabiabox.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;       # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;         # managed by Certbot
}

# HTTP -> HTTPS redirect (managed by Certbot)
server {
    if ($host = shop.fabiabox.com) { return 301 https://$host$request_uri; }
    listen 80;
    listen [::]:80;
    server_name shop.fabiabox.com;
    return 404; # managed by Certbot
}
