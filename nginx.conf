# FABIABox Shop — static files + Flask API proxy + certbot SSL
server {
    server_name shop.fabiabox.com www.shop.fabiabox.com;

    # Canonical redirect to shop.fabiabox.com
    if ($host ~* ^(www\.shop\.fabiabox\.com)$) {
        return 301 https://shop.fabiabox.com$request_uri;
    }

    root /var/www/fabiaweb_shop;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Serve static files directly
    location = / {
        try_files /index.html =404;
    }
    location = /index.html { try_files $uri =404; }

    # Proxy API routes to Flask (loopback only)
    location = /submit {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /health {
        access_log off;
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
    }

    # Block sensitive files
    location ~ /\.env { deny all; }
    location ~ /\.git { deny all; }
    location ~ \.(csv|py|sh|conf|txt)$ { deny all; }

    # Certbot SSL
    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/shop.fabiabox.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/shop.fabiabox.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# HTTP -> HTTPS redirect (managed by Certbot)
server {
    if ($host = www.shop.fabiabox.com) { return 301 https://$host$request_uri; }
    listen 80;
    listen [::]:80;
    server_name shop.fabiabox.com www.shop.fabiabox.com;
    return 404; # managed by Certbot
}
